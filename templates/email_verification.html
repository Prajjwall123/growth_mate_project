<!DOCTYPE html>
<html lang="en">

<head>
    <title>Verify Your Email</title>
</head>

<body>
    <h2>Hello {{ name }},</h2>
    <p>Thank you for registering. Please confirm your email address by clicking the link below:</p>
    <p>
        <a href="http://{{ domain }}/activate/{{ uid }}/{{ token }}">Activate Your Account</a>
    </p>
    <p>Thank you!</p>
</body>

</html>
