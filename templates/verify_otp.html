<!DOCTYPE html>
<html lang="en">

<head>
    <title>Verify OTP</title>
</head>

<body>
    <h2>Email Verification</h2>
    {% if messages %}
    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>
</body>

</html>
